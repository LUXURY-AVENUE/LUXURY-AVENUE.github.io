<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masterpiece Anniversary | DJ BEATS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700;900&display=swap');

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 10px; }

        body {
            margin: 0; padding: 0; background: #050505;
            color: #fff; font-family: 'Montserrat', sans-serif;
            text-align: center; overflow-x: hidden;
        }

        /* Loading Screen for Auto-play Support */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex;
            align-items: center; justify-content: center; flex-direction: column;
        }
        .start-btn {
            background: #ffd700; color: #000; padding: 20px 40px;
            font-weight: 900; font-size: 1.5rem; border: none;
            border-radius: 50px; cursor: pointer; letter-spacing: 2px;
            box-shadow: 0 0 30px #ffd700; transition: 0.3s;
        }
        .start-btn:hover { transform: scale(1.1); box-shadow: 0 0 50px #ffd700; }

        /* Background Pulsating Hearts */
        .heart-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .floating-heart {
            position: absolute; color: rgba(255, 215, 0, 0.15);
            animation: pulse-heart 3s infinite ease-in-out;
        }
        @keyframes pulse-heart {
            0%, 100% { transform: scale(0.8); opacity: 0.1; }
            50% { transform: scale(1.2); opacity: 0.3; }
        }

        /* Top Scrolling Bar */
        .top-bar {
            background: linear-gradient(90deg, #ffd700, #b8860b, #ffd700);
            color: #000; padding: 12px 0; font-weight: 900;
            position: fixed; width: 100%; top: 0; z-index: 1000;
            box-shadow: 0 5px 25px rgba(255,215,0,0.5);
        }

        /* Professional Logo Section */
        .logo-div { margin-top: 100px; padding: 20px; }
        .logo-ring {
            width: 130px; height: 130px; border: 4px solid #ffd700;
            border-radius: 50%; margin: 0 auto; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 0 30px #ffd700, inset 0 0 20px #ffd700;
        }
        .logo-div i { font-size: 3.5rem; color: #fff; text-shadow: 0 0 20px #ffd700; }
        .dj-text { 
            font-size: 3.5rem; font-weight: 900; letter-spacing: 12px; 
            display: block; color: #ffd700; margin-top: 20px;
        }

        /* Dashboard Main Image - Fixed Alignment */
        .main-dashboard { max-width: 1100px; margin: 40px auto; padding: 10px; }
        .featured-img {
            width: 100%; height: auto; max-height: 85vh;
            object-fit: contain; border-radius: 20px;
            border: 2px solid rgba(255,215,0,0.4);
            background: rgba(255,255,255,0.02);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .hero h1 {
            font-family: 'Great Vibes', cursive; font-size: clamp(4rem, 12vw, 7.5rem);
            color: #ffd700; margin: 20px 0;
        }

        /* Fixed Photo Grid - Uniform Sizes */
        .gallery {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px; padding: 30px; max-width: 1300px; margin: 0 auto;
        }
        .photo-card {
            background: rgba(255,255,255,0.04); border-radius: 15px;
            padding: 15px; border: 1px solid rgba(255,215,0,0.2);
            display: flex; align-items: center; justify-content: center;
            min-height: 450px; transition: 0.4s;
        }
        .photo-card:hover { transform: translateY(-10px); border-color: #ffd700; }
        .photo-card img { 
            max-width: 100%; max-height: 420px;
            object-fit: contain; border-radius: 10px;
        }

        /* Premium Footer */
        .footer {
            background: #000; padding: 80px 20px;
            border-top: 3px solid #ffd700; margin-top: 80px;
        }
        .song-badge {
            display: inline-flex; align-items: center; gap: 10px;
            background: #ffd700; color: #000; padding: 10px 25px;
            border-radius: 50px; font-weight: bold; margin-bottom: 20px;
        }
        .ashish-brand { font-size: 0.9rem; letter-spacing: 5px; color: #555; margin-top: 30px; }
        .ashish-brand b { color: #ffd700; font-weight: 900; }

        /* Floating Music Toggle */
        #music-btn {
            position: fixed; bottom: 30px; right: 30px;
            background: #ffd700; color: #000; border: none;
            width: 60px; height: 60px; border-radius: 50%;
            cursor: pointer; z-index: 2000; font-size: 1.5rem;
            box-shadow: 0 0 25px #ffd700;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color:#ffd700; font-family:'Great Vibes'; font-size: 3rem;">Welcome to the Magic</h1>
        <button class="start-btn" onclick="initSite()">START CELEBRATION</button>
    </div>

    <div class="heart-bg" id="heart-container"></div>

    <div class="top-bar">
        <marquee scrollamount="12">DJ BEATS KI TRAF SE HAPPY ANNIVERSARY DEEPIKA JI ✨ WISHING YOU ETERNAL LOVE & HAPPINESS ✨ FOREVER TOGETHER ✨</marquee>
    </div>

    <div class="logo-div">
        <div class="logo-ring"><i class="fas fa-headphones-alt"></i></div>
        <span class="dj-text">DJ BEATS</span>
    </div>

    <div class="main-dashboard">
        <img src="WhatsApp Image 2026-05-09 at 3.36.18 PM.jpeg" class="featured-img" alt="Main Moment">
    </div>

    <section class="hero">
        <h1>Eternal Love</h1>
        <h2 style="font-weight:300; letter-spacing:8px; color:#ffd700;">DEEPIKA & MAHI</h2>
    </section>

    <div class="gallery">
        <div class="photo-card"><img src="WhatsApp Image 2026-05-09 at 3.58.37 PM.jpeg"></div>
        <div class="photo-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM (3).jpeg"></div>
        <div class="photo-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM (2).jpeg"></div>
        <div class="photo-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM (1).jpeg"></div>
        <div class="photo-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM.jpeg"></div>
        <div class="photo-card"><img src="WhatsApp Image 2026-05-09 at 3.36.16 PM (1).jpeg"></div>
        <div class="photo-card"><img src="WhatsApp Image 2026-05-09 at 3.36.16 PM.jpeg"></div>
    </div>

    <div class="footer">
        <div class="song-badge">
            <i class="fab fa-youtube"></i> Now Playing: Jogi (Exclusive)
        </div>
        <h3 style="font-family: 'Great Vibes'; font-size: 3.5rem; color: #ffd700; margin: 10px 0;">Together Since Forever</h3>
        <p style="letter-spacing: 5px; color:#888;">PRESENTED BY DJ BEATS FAMILY</p>
        <div class="ashish-brand">DEVELOPED BY <b>ASHISH</b></div>
    </div>

    <audio id="bg-music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <button id="music-btn" onclick="toggleMusic()">
        <i class="fas fa-pause"></i>
    </button>

    <script>
        function initSite() {
            document.getElementById('overlay').style.display = 'none';
            const music = document.getElementById("bg-music");
            music.play();
            generateHearts();
        }

        function generateHearts() {
            const container = document.getElementById('heart-container');
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('i');
                heart.className = 'fas fa-heart floating-heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = Math.random() * 100 + 'vh';
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                heart.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(heart);
            }
        }

        function toggleMusic() {
            var music = document.getElementById("bg-music");
            var btn = document.getElementById("music-btn");
            if (music.paused) { 
                music.play(); 
                btn.innerHTML = '<i class="fas fa-pause"></i>';
            } else { 
                music.pause(); 
                btn.innerHTML = '<i class="fas fa-play"></i>';
            }
        }
    </script>
</body>
</html>
